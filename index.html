<!DOCTYPE html>
<html lang="it">
<head>

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Angelo Tarditi" />
  <meta name="twitter:description" content="Account & Project Manager · Creative Strategist · Cofondatore di Eskimo Creative Agency" />
  <meta name="twitter:image" content="og-image.jpg" />

  <!-- Favicon (SVG + fallback) -->
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="alternate icon" href="favicon.ico" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght,SOFT@0,9..144,400..900,0..100;1,9..144,400..900,0..100&family=Instrument+Sans:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet" />

  <style>
    /* ---------- Reset & tokens ---------- */
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }

    :root {
      --paper:   #efeadc;      /* off-white caldo */
      --ink:     #111112;      /* nero inchiostro */
      --ink-dim: #3a3a3c;
      --accent:  #d94f1f;      /* terracotta accent */
      --line:    rgba(17, 17, 18, 0.22);
      --overlay: rgba(10, 10, 12, 0.45);
      --gutter:  clamp(18px, 3vw, 36px);
      --stroke:  1.2px;
      --ease:    cubic-bezier(.22, 1, .36, 1);
    }

    html, body {
      height: 100%;
      background: var(--paper);
      color: var(--ink);
      font-family: "Instrument Sans", system-ui, sans-serif;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      position: relative;
      min-height: 100svh;
      min-height: 100vh;
      overflow: hidden;
      transition: background-color .6s var(--ease);
    }

    /* ---------- Background image stage ---------- */
    .stage {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }
    .layer {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      opacity: 0;
      transform: scale(1.06);
      transition: opacity 1s var(--ease), transform 6s var(--ease);
      will-change: opacity, transform;
    }
    .layer.is-active {
      opacity: 1;
      transform: scale(1);
    }
    .stage::after { /* overlay per leggibilità */
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at center, rgba(0,0,0,0) 0%, rgba(0,0,0,.28) 60%, rgba(0,0,0,.55) 100%),
        linear-gradient(180deg, rgba(0,0,0,.18), rgba(0,0,0,.32));
      opacity: 0;
      transition: opacity 1s var(--ease);
    }
    body.is-hot .stage::after { opacity: 1; }

    /* Subtle paper grain on default state */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background-image:
        radial-gradient(circle at 20% 20%, rgba(17,17,18,0.03) 0, transparent 40%),
        radial-gradient(circle at 80% 80%, rgba(17,17,18,0.04) 0, transparent 45%);
      mix-blend-mode: multiply;
      opacity: 1;
      transition: opacity .6s var(--ease);
    }
    body.is-hot::before { opacity: 0; }

    /* ---------- Main ---------- */
    main {
      position: relative;
      z-index: 2;
      min-height: 100svh;
      min-height: 100vh;
      padding: calc(var(--gutter) * 2) var(--gutter);
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 1.25rem;
    }

    header.meta {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 2rem;
      font-family: "Instrument Sans", sans-serif;
      font-size: clamp(11px, 1.05vw, 13px);
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--ink);
      mix-blend-mode: difference;
      /* difference con bianco → rende il testo leggibile su ogni sfondo */
    }
    header.meta .left, header.meta .right {
      color: #fff; /* difference con sfondo reale */
    }
    header.meta span { opacity: .9; }
    header.meta em {
      font-style: normal;
      font-family: "Fraunces", serif;
      font-style: italic;
      font-weight: 400;
      text-transform: none;
      letter-spacing: 0;
      font-size: 1.15em;
      opacity: .8;
    }

    /* ---------- Hero (the name) ---------- */
    .hero {
      align-self: center;
      text-align: center;
      position: relative;
    }

    .name {
      margin: 0;
      font-family: "Fraunces", serif;
      font-weight: 900;
      font-variation-settings: "opsz" 144, "SOFT" 30;
      font-size: clamp(3.2rem, 13.5vw, 15rem);
      line-height: .86;
      letter-spacing: -0.035em;
      color: var(--ink);
      user-select: none;
      cursor: default;
      transition: color .5s var(--ease);
      /* prevent awkward text-wrap */
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0;
    }

    .name .word {
      display: inline-flex;
      flex-wrap: nowrap;
    }
    .name .sp {
      width: 0.38ch;
      display: inline-block;
    }

    .name .ltr {
      display: inline-block;
      position: relative;
      transition:
        color .35s var(--ease),
        -webkit-text-stroke-color .35s var(--ease),
        transform .5s var(--ease);
      cursor: pointer;
    }

    /* Outline state: applied to all letters when any is active */
    body.is-hot .name .ltr {
      color: transparent;
      -webkit-text-stroke: var(--stroke) rgba(255,255,255,0.9);
      text-stroke: var(--stroke) rgba(255,255,255,0.9);
    }

    /* The active letter itself: slightly highlighted */
    body.is-hot .name .ltr.is-active {
      -webkit-text-stroke-color: #fff;
      color: rgba(255,255,255,0.08);
      transform: translateY(-0.012em);
    }

    /* Hover hint when nothing is active yet (desktop) */
    @media (hover: hover) {
      .name .ltr:hover {
        color: var(--accent);
      }
      body.is-hot .name .ltr:hover {
        color: rgba(255,255,255,0.15);
      }
    }

    /* ---------- Caption area ---------- */
    .below {
      align-self: end;
      text-align: center;
      display: grid;
      place-items: center;
      gap: 1rem;
      padding-bottom: 1.5rem;
      min-height: 5rem;
      position: relative;
    }

    .subtitle {
      font-family: "Instrument Sans", sans-serif;
      font-weight: 500;
      font-size: clamp(12px, 1.25vw, 16px);
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--ink-dim);
      margin: 0;
      max-width: 52rem;
      line-height: 1.45;
      transition: opacity .45s var(--ease), transform .45s var(--ease);
    }
    body.is-hot .subtitle {
      color: rgba(255,255,255,0.78);
      opacity: 0;
      transform: translateY(8px);
      pointer-events: none;
    }

    .caption {
      position: absolute;
      left: 50%;
      transform: translate(-50%, 8px);
      bottom: 0.25rem;
      margin: 0;
      font-family: "Fraunces", serif;
      font-style: italic;
      font-weight: 400;
      font-variation-settings: "opsz" 28, "SOFT" 50;
      font-size: clamp(16px, 1.9vw, 24px);
      color: #fff;
      letter-spacing: 0;
      line-height: 1.35;
      max-width: min(90vw, 42rem);
      opacity: 0;
      transition: opacity .5s var(--ease) .05s, transform .55s var(--ease) .05s;
      text-wrap: balance;
      pointer-events: none;
      text-shadow: 0 1px 16px rgba(0,0,0,0.35);
    }
    body.is-hot .caption.is-visible {
      opacity: 1;
      transform: translate(-50%, 0);
    }
    .caption::before {
      content: "";
      display: block;
      width: 36px;
      height: 1px;
      background: rgba(255,255,255,0.55);
      margin: 0 auto 14px auto;
    }

    /* ---------- Corner links ---------- */
    .corner {
      position: fixed;
      z-index: 5;
      font-family: "Instrument Sans", sans-serif;
      font-size: clamp(11px, 1.05vw, 13px);
      letter-spacing: .14em;
      text-transform: uppercase;
      text-decoration: none;
      color: var(--ink);
      padding: .45rem .1rem;
      mix-blend-mode: difference;
      display: inline-flex;
      align-items: center;
      gap: .5rem;
      transition: gap .35s var(--ease);
    }
    .corner,
    .corner:visited { color: #fff; } /* difference handles it */
    .corner .arrow {
      display: inline-block;
      transition: transform .35s var(--ease);
    }
    .corner:hover { gap: .8rem; }
    .corner:hover .arrow { transform: translateX(3px); }

    .corner.tr {
      top: var(--gutter);
      right: var(--gutter);
    }
    .corner.bl {
      bottom: var(--gutter);
      left: var(--gutter);
    }
    .corner.bl .arrow { transform: rotate(180deg); }
    .corner.bl:hover .arrow { transform: rotate(180deg) translateX(3px); }

    /* ---------- Hint (desktop only) ---------- */
    .hint {
      position: fixed;
      bottom: var(--gutter);
      right: var(--gutter);
      z-index: 5;
      font-family: "Fraunces", serif;
      font-style: italic;
      font-size: clamp(11px, 1vw, 13px);
      color: var(--ink-dim);
      letter-spacing: 0;
      mix-blend-mode: difference;
      opacity: .7;
      pointer-events: none;
      transition: opacity .5s var(--ease);
    }
    .hint span { color: #fff; }
    body.has-interacted .hint { opacity: 0; }

    @media (hover: none) {
      .hint span::before { content: "Tap sulle lettere"; }
    }
    @media (hover: hover) {
      .hint span::before { content: "Passa sulle lettere"; }
    }

    /* ---------- Mobile adjustments ---------- */
    @media (max-width: 700px) {
      :root { --gutter: 16px; }
      main {
        padding: 4.5rem var(--gutter) 3rem;
        gap: 1.5rem;
        grid-template-rows: 1fr auto;
      }
      header.meta {
        display: none; /* evita sovrapposizione con i corner links */
      }
      .hero {
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .name {
        font-size: clamp(2.6rem, 19vw, 6rem);
        line-height: .9;
      }
      .subtitle {
        font-size: 11px;
        letter-spacing: .14em;
        line-height: 1.55;
      }
      .caption {
        font-size: 16px;
        bottom: 1rem;
      }
      .below {
        min-height: 6rem;
        padding-bottom: 2.2rem;
      }
      .corner { font-size: 10px; }
      .hint { display: none; } /* spazio ridotto su mobile */
    }

    @media (max-width: 420px) {
      .name {
        font-size: clamp(2.4rem, 20vw, 4.5rem);
      }
    }

    /* Accessibility */
    @media (prefers-reduced-motion: reduce) {
      * {
        transition-duration: .01ms !important;
        animation-duration: .01ms !important;
      }
    }

    /* Focus styles for keyboard nav */
    .name .ltr:focus-visible {
      outline: 2px dashed currentColor;
      outline-offset: 4px;
    }
    a:focus-visible {
      outline: 2px dashed currentColor;
      outline-offset: 3px;
    }
  </style>
</head>
<body>

  <!-- Background stage: one layer per letter -->
  <div class="stage" aria-hidden="true">
    <div class="layer" data-i="0"  style="background-image:url('assets/01.jpg')"></div>
    <div class="layer" data-i="1"  style="background-image:url('assets/02.jpg')"></div>

    <div class="layer" data-i="9"  style="background-image:url('assets/10.jpg')"></div>
    <div class="layer" data-i="10" style="background-image:url('assets/11.jpg')"></div>
    <div class="layer" data-i="11" style="background-image:url('assets/12.jpg')"></div>
    <div class="layer" data-i="12" style="background-image:url('assets/13.jpg')"></div>
  </div>

  <main>
    <header class="meta">
      <div class="left">
        <span>Portfolio <em>— tredici capitoli</em></span>
      </div>
      <div class="right">
        <span>Torino · IT</span>
      </div>
    </header>

    <section class="hero" aria-label="Nome">
      <h1 class="name" id="name">
        <span class="word" aria-label="Angelo">
          <span class="ltr" data-i="0" tabindex="0">A</span><span class="ltr" data-i="1" tabindex="0">N</span><span class="ltr" data-i="2" tabindex="0">G</span><span class="ltr" data-i="3" tabindex="0">E</span><span class="ltr" data-i="4" tabindex="0">L</span><span class="ltr" data-i="5" tabindex="0">O</span>
        </span>
        <span class="sp" aria-hidden="true">&nbsp;</span>
        <span class="word" aria-label="Tarditi">
          <span class="ltr" data-i="6"  tabindex="0">T</span><span class="ltr" data-i="7"  tabindex="0">A</span><span class="ltr" data-i="8"  tabindex="0">R</span><span class="ltr" data-i="9"  tabindex="0">D</span><span class="ltr" data-i="10" tabindex="0">I</span><span class="ltr" data-i="11" tabindex="0">T</span><span class="ltr" data-i="12" tabindex="0">I</span>
        </span>
      </h1>
    </section>

    <div class="below">
      <p class="subtitle">
        Account e Project Manager · Creative Strategist · Cofondatore di Eskimo Creative Agency
      </p>
      <p class="caption" id="caption" aria-live="polite"></p>
    </div>
  </main>

  <a class="corner tr" href="https://www.linkedin.com/in/angelotarditi/" target="_blank" rel="noopener noreferrer">
    <span>LinkedIn</span> <span class="arrow" aria-hidden="true">↗</span>
  </a>
  <a class="corner bl" href="mailto:angelotarditi@gmail.com">
    <span class="arrow" aria-hidden="true">↗</span> <span>angelotarditi@gmail.com</span>
  </a>

  <div class="hint" aria-hidden="true"><span></span></div>

  <script>
    (function () {
      const captions = [
        /* A */ "Da piccolo giocavo a fare il lavoro che faccio oggi.",
        /* N */ "Ingegneria del cinema: aveva anche dei corsi per imparare a raccontare storie.",
        /* G */ "La prima fiera sui dispositivi indossabili: il Wearable Tech Torino.",
        /* E */ "Il primo giorno di vero lavoro. In Eggers.",
        /* L */ "Gli amici dell'università.",
        /* O */ "11 novembre 2017 — la prima edizione di Visionary Days.",
        /* T */ "La seconda edizione di Visionary Days.",
        /* A */ "Una pagina intera su La Stampa.",
        /* R */ "Un piano editoriale, ma fisico.",
        /* D */ "Quella volta che ero in videochiamata con Mattarella.",
        /* I */ "#UnoNonBasta e la proiezione su Palazzo Chigi.",
        /* T */ "Una campagna elettorale per un candidato fake.",
        /* I */ "…il prossimo capitolo è ancora da scrivere."
      ];

      const body      = document.body;
      const stage     = document.querySelector('.stage');
      const layers    = Array.from(document.querySelectorAll('.layer'));
      const letters   = Array.from(document.querySelectorAll('.name .ltr'));
      const captionEl = document.getElementById('caption');

      let activeIdx = -1;
      let leaveTimer = null;

      function activate(i) {
        if (i === activeIdx) return;
        clearTimeout(leaveTimer);

        // Update background layers
        layers.forEach(l => l.classList.toggle('is-active', +l.dataset.i === i));

        // Update letters
        letters.forEach(l => l.classList.toggle('is-active', +l.dataset.i === i));

        // Update caption
        captionEl.textContent = captions[i] || '';
        captionEl.classList.add('is-visible');

        body.classList.add('is-hot', 'has-interacted');

        activeIdx = i;
      }

      function deactivate() {
        clearTimeout(leaveTimer);
        leaveTimer = setTimeout(() => {
          layers.forEach(l => l.classList.remove('is-active'));
          letters.forEach(l => l.classList.remove('is-active'));
          captionEl.classList.remove('is-visible');
          body.classList.remove('is-hot');
          activeIdx = -1;
        }, 140);
      }

      // Desktop: hover
      letters.forEach((ltr) => {
        const i = +ltr.dataset.i;

        ltr.addEventListener('mouseenter', () => activate(i));
        ltr.addEventListener('focus',       () => activate(i));

        // Touch / tap — toggle on tap
        ltr.addEventListener('click', (e) => {
          e.preventDefault();
          if (activeIdx === i) {
            deactivate();
          } else {
            activate(i);
          }
        });

        // Keyboard
        ltr.addEventListener('keydown', (e) => {
          if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            activate(i);
          }
          if (e.key === 'Escape') {
            deactivate();
            ltr.blur();
          }
        });
      });

      // Leave area when mouse exits the whole name on desktop
      const nameEl = document.getElementById('name');
      nameEl.addEventListener('mouseleave', deactivate);

      // Click outside name to deactivate (mobile)
      document.addEventListener('click', (e) => {
        if (!nameEl.contains(e.target)) deactivate();
      });

      // Preload images for smooth transitions
      [
        '01','02','03','04','05','06','07','08','09','10','11','12','13'
      ].forEach(n => {
        const img = new Image();
        img.src = `assets/${n}.jpg`;
      });
    })();
  </script>
</body>
