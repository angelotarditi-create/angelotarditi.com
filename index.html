<!DOCTYPE html>
<html lang="it">
<head>

  <meta property="og:type" content="website" />

  <meta property="og:description" content="Account & Project Manager · Creative Strategist · Cofondatore di Eskimo Creative Agency" />
  <meta property="og:image" content="og-image.jpg" />

  <meta property="og:image:height" content="630" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Angelo Tarditi" />
  <meta name="twitter:description" content="Account & Project Manager · Creative Strategist · Cofondatore di Eskimo Creative Agency" />
  <meta name="twitter:image" content="og-image.jpg" />

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="alternate icon" href="favicon.ico" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght,SOFT@0,9..144,400..900,0..100;1,9..144,400..900,0..100&family=Instrument+Sans:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet" />

  <style>
    /* ---------- Reset & tokens ---------- */
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }

    :root {
      --paper:   #efeadc;      /* off-white caldo */
      --ink:     #111112;      /* nero inchiostro */
      --ink-dim: #2b2b2e;      /* più scuro per i metadati */
      --accent:  #d94f1f;      /* terracotta accent */
      --line:    rgba(17, 17, 18, 0.22);
      --gutter:  clamp(18px, 3vw, 36px);
      --stroke:  1.2px;
      --ease:    cubic-bezier(.22, 1, .36, 1);

      /* safe area per iOS notch / bordi arrotondati */
      --safe-t: env(safe-area-inset-top,    0px);
      --safe-r: env(safe-area-inset-right,  0px);
      --safe-b: env(safe-area-inset-bottom, 0px);
      --safe-l: env(safe-area-inset-left,   0px);
    }

    html, body {
      height: 100%;
      background: var(--paper);
      color: var(--ink);
      font-family: "Instrument Sans", system-ui, sans-serif;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      /* FIX mobile: rimuove flash blu/grigio su tap */
      -webkit-tap-highlight-color: transparent;
    }

    body {
      position: relative;
      min-height: 100svh;
      min-height: 100vh;
      overflow: hidden;
      transition: background-color .6s var(--ease);
    }

    /* ---------- Background image stage ---------- */
    .stage {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }
    .layer {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      opacity: 0;
      transform: scale(1.06);
      transition: opacity 1s var(--ease), transform 6s var(--ease);
      will-change: opacity, transform;
    }
    .layer.is-active {
      opacity: 1;
      transform: scale(1);
    }
    .stage::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at center, rgba(0,0,0,0) 0%, rgba(0,0,0,.28) 60%, rgba(0,0,0,.55) 100%),
        linear-gradient(180deg, rgba(0,0,0,.18), rgba(0,0,0,.32));
      opacity: 0;
      transition: opacity 1s var(--ease);
    }
    body.is-hot .stage::after { opacity: 1; }

    /* Scrim inferiore: gradient scuro sul fondo, appare con is-hot,
       garantisce leggibilità del caption anche su immagini chiare */
    .scrim {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      height: 35vh;
      z-index: 1;
      pointer-events: none;
      background: linear-gradient(180deg,
        rgba(0,0,0,0) 0%,
        rgba(0,0,0,0.35) 60%,
        rgba(0,0,0,0.6) 100%);
      opacity: 0;
      transition: opacity .7s var(--ease);
    }
    body.is-hot .scrim { opacity: 1; }

    /* Paper grain sul default */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background-image:
        radial-gradient(circle at 20% 20%, rgba(17,17,18,0.03) 0, transparent 40%),
        radial-gradient(circle at 80% 80%, rgba(17,17,18,0.04) 0, transparent 45%);
      mix-blend-mode: multiply;
      opacity: 1;
      transition: opacity .6s var(--ease);
    }
    body.is-hot::before { opacity: 0; }

    /* ---------- Main ---------- */
    main {
      position: relative;
      z-index: 2;
      min-height: 100svh;
      min-height: 100vh;
      padding:
        calc(var(--gutter) * 3 + var(--safe-t))
        calc(var(--gutter) + var(--safe-r))
        calc(var(--gutter) * 2 + var(--safe-b))
        calc(var(--gutter) + var(--safe-l));
      display: grid;
      grid-template-rows: 1fr auto;
      gap: 1.25rem;
    }

    /* ---------- Top-left stack: Portfolio ---------- */
    .tl-stack {
      position: fixed;
      top: calc(var(--gutter) + var(--safe-t));
      left: calc(var(--gutter) + var(--safe-l));
      z-index: 5;
    }
    .portfolio {
      font-family: "Instrument Sans", sans-serif;
      font-size: clamp(11px, 1.05vw, 13px);
      font-weight: 500;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--ink);
      transition: color .5s var(--ease);
    }
    .portfolio em {
      font-family: "Fraunces", serif;
      font-style: italic;
      font-weight: 400;
      text-transform: none;
      letter-spacing: 0;
      font-size: 1.15em;
      opacity: .72;
    }
    body.is-hot .portfolio {
      color: rgba(255,255,255,0.85);
    }

    /* ---------- Hero (the name) ---------- */
    .hero {
      align-self: center;
      text-align: center;
      position: relative;
    }

    .name {
      margin: 0;
      font-family: "Fraunces", serif;
      font-weight: 900;
      font-variation-settings: "opsz" 144, "SOFT" 30;
      font-size: clamp(3.2rem, 13.5vw, 15rem);
      line-height: .86;
      letter-spacing: -0.035em;
      color: var(--ink);
      /* FIX mobile: blocca la selezione testo su tap lungo */
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
      transition: color .5s var(--ease);
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0;
    }

    .name .word { display: inline-flex; flex-wrap: nowrap; }
    .name .sp   { width: 0.38ch; display: inline-block; }

    .name .ltr {
      display: inline-block;
      position: relative;
      /* FIX: NIENTE cursor pointer, non sono "cliccabili" visivamente */
      cursor: default;
      /* FIX mobile: elimina delay 300ms + blocca pinch-zoom sulle lettere */
      touch-action: manipulation;
      transition:
        color .35s var(--ease),
        -webkit-text-stroke-color .35s var(--ease),
        -webkit-text-stroke-width .35s var(--ease),
        transform .5s var(--ease);
    }

    /* DESKTOP — hover: la lettera diventa arancione */
    @media (hover: hover) {
      .name .ltr:hover { color: var(--accent); }
    }

    /* Stato con immagine attiva: tutte le lettere outline bianco */
    body.is-hot .name .ltr {
      color: transparent;
      -webkit-text-stroke: var(--stroke) rgba(255,255,255,0.9);
    }

    /* La lettera attiva è arancione pieno */
    body.is-hot .name .ltr.is-active {
      color: var(--accent);
      -webkit-text-stroke-width: 0;
    }

    @media (hover: hover) {
      body.is-hot .name .ltr:hover {
        color: var(--accent);
        -webkit-text-stroke-width: 0;
      }
    }

    /* ---------- Caption area ---------- */
    .below {
      align-self: end;
      text-align: center;
      display: grid;
      place-items: center;
      gap: 1rem;
      padding-bottom: 1.5rem;
      min-height: 5rem;
      position: relative;
    }

    .subtitle {
      font-family: "Instrument Sans", sans-serif;
      font-weight: 500;
      font-size: clamp(12px, 1.25vw, 16px);
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--ink-dim);
      margin: 0;
      max-width: 52rem;
      line-height: 1.45;
      transition: opacity .45s var(--ease), transform .45s var(--ease), color .5s var(--ease);
    }
    body.is-hot .subtitle {
      color: rgba(255,255,255,0.78);
      opacity: 0;
      transform: translateY(8px);
      pointer-events: none;
    }

    .caption {
      position: absolute;
      left: 50%;
      transform: translate(-50%, 8px);
      bottom: 0.25rem;
      margin: 0;
      font-family: "Fraunces", serif;
      font-style: italic;
      font-weight: 500;
      font-variation-settings: "opsz" 28, "SOFT" 50;
      font-size: clamp(17px, 1.9vw, 24px);
      color: #fff;
      letter-spacing: 0;
      line-height: 1.35;
      max-width: min(90vw, 42rem);
      opacity: 0;
      transition: opacity .5s var(--ease) .05s, transform .55s var(--ease) .05s;
      text-wrap: balance;
      pointer-events: none;
      text-shadow:
        0 1px 2px rgba(0,0,0,0.6),
        0 2px 18px rgba(0,0,0,0.5);
    }
    body.is-hot .caption.is-visible {
      opacity: 1;
      transform: translate(-50%, 0);
    }
    .caption::before {
      content: "";
      display: block;
      width: 36px;
      height: 1px;
      background: rgba(255,255,255,0.55);
      margin: 0 auto 14px auto;
    }

    /* ---------- Top-right stack: LinkedIn + location ---------- */
    .tr-stack {
      position: fixed;
      top: calc(var(--gutter) + var(--safe-t));
      right: calc(var(--gutter) + var(--safe-r));
      z-index: 5;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: .4rem;
      text-align: right;
    }
    .tr-stack .locus {
      font-family: "Instrument Sans", sans-serif;
      font-weight: 500;
      font-size: clamp(10px, 1vw, 12px);
      letter-spacing: .22em;
      text-transform: uppercase;
      color: var(--ink);
      transition: color .5s var(--ease);
    }
    body.is-hot .tr-stack .locus {
      color: rgba(255,255,255,0.78);
    }

    /* ---------- Corner links ---------- */
    .corner {
      font-family: "Instrument Sans", sans-serif;
      font-size: clamp(11px, 1.05vw, 13px);
      font-weight: 500;
      letter-spacing: .14em;
      text-transform: uppercase;
      text-decoration: none;
      padding: .45rem .1rem;
      display: inline-flex;
      align-items: center;
      gap: .5rem;
      color: var(--ink);
      transition: color .5s var(--ease), gap .35s var(--ease);
      touch-action: manipulation;
    }
    body.is-hot .corner { color: rgba(255,255,255,0.95); }
    .corner .arrow {
      display: inline-block;
      transition: transform .35s var(--ease);
    }
    @media (hover: hover) {
      .corner:hover { gap: .8rem; color: var(--accent); }
      .corner:hover .arrow { transform: translateX(3px); }
    }

    .corner.bl {
      position: fixed;
      bottom: calc(var(--gutter) + var(--safe-b));
      left: calc(var(--gutter) + var(--safe-l));
      z-index: 5;
    }
    .corner.bl .arrow { transform: rotate(180deg); }
    @media (hover: hover) {
      .corner.bl:hover .arrow { transform: rotate(180deg) translateX(3px); }
    }

    /* ---------- Hint (desktop only) ---------- */
    .hint {
      position: fixed;
      bottom: calc(var(--gutter) + var(--safe-b));
      right: calc(var(--gutter) + var(--safe-r));
      z-index: 5;
      font-family: "Fraunces", serif;
      font-style: italic;
      font-size: clamp(11px, 1vw, 13px);
      color: var(--ink-dim);
      transition: opacity .5s var(--ease), color .5s var(--ease);
      opacity: .7;
      pointer-events: none;
    }
    body.is-hot .hint { color: rgba(255,255,255,0.6); }
    body.has-interacted .hint { opacity: 0; }

    @media (hover: none) {
      .hint { display: none; }
    }

    /* ---------- Mobile ---------- */
    @media (max-width: 700px) {
      :root { --gutter: 16px; }

      main {
        padding:
          calc(4.5rem + var(--safe-t))
          calc(var(--gutter) + var(--safe-r))
          calc(2rem + var(--safe-b))
          calc(var(--gutter) + var(--safe-l));
        gap: 1rem;
        grid-template-rows: 1fr auto;
      }
      .portfolio {
        font-size: 10px;
        letter-spacing: .08em;
      }
      .portfolio em { font-size: 1.1em; }

      .hero {
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .name {
        font-size: clamp(2.6rem, 19vw, 6rem);
        line-height: .9;
      }
      .subtitle {
        font-size: 11px;
        letter-spacing: .14em;
        line-height: 1.6;
      }
      .caption {
        font-size: 19px;
        line-height: 1.4;
        bottom: 1.25rem;
        max-width: 92vw;
      }
      .below {
        min-height: 7rem;
        padding-bottom: 2.8rem;
      }
      .tr-stack .locus {
        font-size: 9px;
        letter-spacing: .2em;
      }
      .corner { font-size: 10px; }

      /* Hit area leggermente ingrandita per tap comodo */
      .name .ltr { padding: 0 1px; }

      /* Scrim leggermente più ampio su mobile per coprire caption + sottotesto area */
      .scrim { height: 45vh; }
    }

    @media (max-width: 420px) {
      .name {
        font-size: clamp(2.4rem, 20vw, 4.5rem);
      }
      .portfolio em { display: none; }
    }

    /* Accessibility */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        transition-duration: .01ms !important;
        animation-duration: .01ms !important;
      }
    }

    a:focus-visible {
      outline: 2px dashed currentColor;
      outline-offset: 3px;
      border-radius: 2px;
    }
  </style>
</head>
<body>

  <!-- Background stage: one layer per letter -->
  <div class="stage" aria-hidden="true">
    <div class="layer" data-i="0"  style="background-image:url('assets/01.jpg')"></div>
    <div class="layer" data-i="1"  style="background-image:url('assets/02.jpg')"></div>
    <div class="layer" data-i="2"  style="background-image:url('assets/03.jpg')"></div>
    <div class="layer" data-i="3"  style="background-image:url('assets/04.jpg')"></div>
    <div class="layer" data-i="4"  style="background-image:url('assets/05.jpg')"></div>
    <div class="layer" data-i="5"  style="background-image:url('assets/06.jpg')"></div>
    <div class="layer" data-i="6"  style="background-image:url('assets/07.jpg')"></div>
    <div class="layer" data-i="7"  style="background-image:url('assets/08.jpg')"></div>
    <div class="layer" data-i="8"  style="background-image:url('assets/09.jpg')"></div>
    <div class="layer" data-i="9"  style="background-image:url('assets/10.jpg')"></div>
    <div class="layer" data-i="10" style="background-image:url('assets/11.jpg')"></div>
    <div class="layer" data-i="11" style="background-image:url('assets/12.jpg')"></div>
    <div class="layer" data-i="12" style="background-image:url('assets/13.jpg')"></div>
  </div>

  <div class="scrim" aria-hidden="true"></div>

  <main>
    <section class="hero" aria-label="Nome">
      <h1 class="name" id="name">
        <span class="word" aria-label="Angelo">
          <span class="ltr" data-i="0">A</span><span class="ltr" data-i="1">N</span><span class="ltr" data-i="2">G</span><span class="ltr" data-i="3">E</span><span class="ltr" data-i="4">L</span><span class="ltr" data-i="5">O</span>
        </span>
        <span class="sp" aria-hidden="true">&nbsp;</span>
        <span class="word" aria-label="Tarditi">
          <span class="ltr" data-i="6">T</span><span class="ltr" data-i="7">A</span><span class="ltr" data-i="8">R</span><span class="ltr" data-i="9">D</span><span class="ltr" data-i="10">I</span><span class="ltr" data-i="11">T</span><span class="ltr" data-i="12">I</span>
        </span>
      </h1>
    </section>

    <div class="below">
      <p class="subtitle">
        Account e Project Manager · Creative Strategist · Cofondatore di Eskimo Creative Agency
      </p>
      <p class="caption" id="caption" aria-live="polite"></p>
    </div>
  </main>

  <!-- Top-left: Portfolio -->
  <div class="tl-stack">
    <span class="portfolio">Portfolio <em>— tredici capitoli</em></span>
  </div>

  <!-- Top-right: LinkedIn + TORINO · CATANIA · IT -->
  <div class="tr-stack">
    <a class="corner tr" href="https://www.linkedin.com/in/angelotarditi/" target="_blank" rel="noopener noreferrer">
      <span>LinkedIn</span> <span class="arrow" aria-hidden="true">↗</span>
    </a>
    <span class="locus">Torino · Catania · IT</span>
  </div>

  <!-- Bottom-left: email -->
  <a class="corner bl" href="mailto:angelotarditi@gmail.com">
    <span class="arrow" aria-hidden="true">↗</span> <span>angelotarditi@gmail.com</span>
  </a>

  <div class="hint" aria-hidden="true"><span>Passa sulle lettere</span></div>

  <script>
    (function () {
      const captions = [
        /* A */ "Da piccolo giocavo a fare il lavoro che faccio oggi.",
        /* N */ "Ingegneria del cinema: aveva anche dei corsi per imparare a raccontare storie.",
        /* G */ "La prima fiera sui dispositivi indossabili: il Wearable Tech Torino.",
        /* E */ "Il primo giorno di vero lavoro. In Eggers.",
        /* L */ "Gli amici dell'università.",
        /* O */ "11 novembre 2017 — la prima edizione di Visionary Days.",
        /* T */ "La seconda edizione di Visionary Days.",
        /* A */ "Una pagina intera su La Stampa.",
        /* R */ "Un piano editoriale, ma fisico.",
        /* D */ "Quella volta che ero in videochiamata con Mattarella.",
        /* I */ "#UnoNonBasta e la proiezione su Palazzo Chigi.",
        /* T */ "Una campagna elettorale per un candidato fake.",
        /* I */ "…il prossimo capitolo è ancora da scrivere."
      ];

      const body      = document.body;
      const layers    = Array.from(document.querySelectorAll('.layer'));
      const letters   = Array.from(document.querySelectorAll('.name .ltr'));
      const captionEl = document.getElementById('caption');
      const nameEl    = document.getElementById('name');

      const isTouch = window.matchMedia('(hover: none)').matches;
      let activeIdx  = -1;
      let leaveTimer = null;

      function activate(i) {
        if (i === activeIdx) return;
        clearTimeout(leaveTimer);
        layers.forEach(l => l.classList.toggle('is-active', +l.dataset.i === i));
        letters.forEach(l => l.classList.toggle('is-active', +l.dataset.i === i));
        captionEl.textContent = captions[i] || '';
        captionEl.classList.add('is-visible');
        body.classList.add('is-hot', 'has-interacted');
        activeIdx = i;
      }

      function deactivate(delay) {
        clearTimeout(leaveTimer);
        leaveTimer = setTimeout(() => {
          layers.forEach(l => l.classList.remove('is-active'));
          letters.forEach(l => l.classList.remove('is-active'));
          captionEl.classList.remove('is-visible');
          body.classList.remove('is-hot');
          activeIdx = -1;
        }, delay || 140);
      }

      if (!isTouch) {
        /* DESKTOP: puro hover — nessun click, nessuna cursor pointer */
        letters.forEach((ltr) => {
          const i = +ltr.dataset.i;
          ltr.addEventListener('mouseenter', () => activate(i));
        });
        nameEl.addEventListener('mouseleave', () => deactivate());
      } else {
        /* MOBILE: tap singolo per attivare, tap fuori per chiudere */
        letters.forEach((ltr) => {
          const i = +ltr.dataset.i;
          const onTap = (e) => {
            e.preventDefault();
            e.stopPropagation();
            if (activeIdx === i) {
              deactivate(60);
            } else {
              activate(i);
            }
          };
          ltr.addEventListener('touchstart', onTap, { passive: false });
          ltr.addEventListener('click',      onTap);
        });

        /* Tap fuori dal nome chiude — salvo link (LinkedIn/email),
           che devono aprirsi senza un flash di chiusura */
        const outsideHandler = (e) => {
          const target = e.target;
          if (nameEl.contains(target)) return;
          if (target.closest && target.closest('a')) return;
          if (activeIdx !== -1) deactivate(60);
        };
        document.addEventListener('touchstart', outsideHandler, { passive: true });
        document.addEventListener('click',      outsideHandler);
      }

      /* Preload per transizioni fluide */
      ['01','02','03','04','05','06','07','08','09','10','11','12','13']
        .forEach(n => { const img = new Image(); img.src = `assets/${n}.jpg`; });
    })();
  </script>
</body>
</html>
